# ============================================
# .github/workflows/cd.yml - Despliegue Continuo
# ============================================

name: CD - Despliegue Continuo

on:
  push:
    branches: [ main ]

jobs:
  # ============================================
  # 1. CONSTRUIR IMÁGENES DOCKER
  # ============================================

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/correspondencia-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/correspondencia-backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/correspondencia-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/correspondencia-frontend:${{ github.sha }}

  # ============================================
  # 2. DESPLEGAR A PRODUCCIÓN
  # ============================================

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /opt/correspondencia
            
            # Descargar imágenes
            docker pull ${{ secrets.DOCKER_USERNAME }}/correspondencia-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/correspondencia-frontend:latest
            
            # Ejecutar migraciones
            docker-compose run --rm backend npm run migrate
            
            # Reiniciar servicios
            docker-compose up -d
            
            # Limpiar imágenes antiguas
            docker system prune -f
          EOF

      - name: Health check
        run: |
          sleep 10
          curl -f https://${{ secrets.DOMAIN }}/health || exit 1